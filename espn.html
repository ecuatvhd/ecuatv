<style>
  :root {
    --neon-green: #00FF41;
    --neon-orange: #FF6B00;
    --dark-bg: #050508;
    --card-bg: #0a0a12;
    --card-border: #1a1a2e;
    --text-primary: #f0f0f0;
    --text-muted: #666;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--dark-bg); }
  ::-webkit-scrollbar-thumb {
    background: linear-gradient(to bottom, var(--neon-green), var(--neon-orange));
    border-radius: 3px;
  }
  * { scrollbar-width: thin; scrollbar-color: var(--neon-green) var(--dark-bg); }

  body {
    background-color: var(--dark-bg);
    /* Fondo estático de puntos, sin animación */
    background-image: radial-gradient(rgba(0,255,65,0.04) 1px, transparent 1px);
    background-size: 32px 32px;
    color: var(--text-primary);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;

    border-bottom: 1px solid rgba(0,255,65,0.2);
    padding: 0 16px;
  }

  .header-inner {
    max-width: 1300px;
    margin: 0 auto;
    display: flex;

    height: 70px;
  }

  .logo {

  }

  /* Logo estático, sin pulso */
  .logo-icon {

    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 14px rgba(0,255,65,0.55);
  }

  .logo-icon::after {

  }

  /* === MAIN === */

  }

  .wrapper {
    max-width: 1300px;
    margin: 0 auto;
    padding: 24px 16px 0;
  }

  /* === PAGE TITLE === */
  .page-title-wrap {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 24px;
  }

  .title-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(0,255,65,0.45));
  }

  .title-line.right {
    background: linear-gradient(to left, transparent, rgba(0,255,65,0.45));
  }

  .page-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1.2rem, 3vw, 1.8rem);
    letter-spacing: 5px;
    color: var(--text-primary);
    white-space: nowrap;
    text-align: center;
  }

  .page-title span { color: var(--neon-green); }

  /* === VIDEO === */
  .video-section {
    position: relative;
    max-width: 760px;
    margin: 0 auto;
  }

  .video-wrapper {
    position: relative;
    background: var(--card-bg);
    border: 1px solid rgba(0,255,65,0.2);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 0 30px rgba(0,255,65,0.06), 0 20px 60px rgba(0,0,0,0.6);
  }

  /* Barra superior estática, sin shimmer */
  .video-wrapper::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(to right, var(--neon-green), var(--neon-orange));
    z-index: 2;
  }

  .embed-responsive {
    position: relative;
    width: 100%;
    padding-top: 56.25%;
  }

  .embed-responsive iframe,
  .embed-responsive img {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    border: none;
    border-radius: 10px;
  }

  /* === RELOAD BUTTON === */
  .reload-wrap {
    margin-top: 20px;
    display: flex;
    justify-content: center;
  }

  .reload-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: transparent;
    border: 1px solid rgba(0,255,65,0.4);
    border-radius: 6px;
    color: var(--neon-green);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 12px 32px;
    cursor: pointer;
    transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
  }

  .reload-btn:hover {
    background: var(--neon-green);
    color: var(--dark-bg);
    border-color: var(--neon-green);
    box-shadow: 0 0 14px rgba(0,255,65,0.4);

  /* === FOOTER === */

    border-top: 1px solid var(--card-border);
    padding: 24px 16px;
    text-align: center;

  .site-footer::before {

    position: absolute;

    width: 120px;
    height: 1px;
    background: var(--neon-green);
    box-shadow: 0 0 12px rgba(0,255,65,0.5);

  .footer-text {

    font-size: 0.8rem;
    letter-spacing: 3px;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  .footer-text span { color: var(--neon-green); font-weight: 700; }
</style>
