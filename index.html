<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> EcuatvHH</title>
<style>
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background-color: #000;
    overflow: hidden;
  }
  .video-wrapper {
    position: relative;
    width: 100%;
    padding-top: 18.75%; /* ✅ 16:3 = 3/16 = 0.1875 */
    background: black;
  }
  iframe {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    border: none;
  }
</style>
</head>
<body>

<div class="video-wrapper">
  <iframe id="player" allowfullscreen allow="autoplay; fullscreen"></iframe>
</div>

<script>
  function getChannelParam() {
    const params = new URLSearchParams(window.location.search);
    let ch = params.get("channel");
    if (!ch) { ch = "default"; }
    return ch;
  }

  const channel = getChannelParam();
  const encoded = btoa(channel); // ✅ convierte "espn" → "ZXNwbgo="
  const url = `https://ecutv-hd--lemahugo972.replit.app/?channel=${encoded}`;

  document.getElementById("player").src = url;
</script>


</body>
</html>
