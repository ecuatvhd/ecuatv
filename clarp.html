<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>EcuTVHD Player</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>▶</text></svg>">

  <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/clappr/clappr-level-selector-plugin@latest/dist/level-selector.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@clappr/hlsjs-playback@1.2.0/dist/hlsjs-playback.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@c3voc/clappr-audio-track-selector@0.2.4/dist/audio-track-selector.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; width: 100%; overflow: hidden; background: #000; }
    #player { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; }
    #topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 500;
      background: linear-gradient(to bottom, rgba(0,0,0,.85) 0%, transparent 100%);
      padding: 12px 16px; display: flex; align-items: center; gap: 12px;
      transition: opacity .4s;
    }
    #topbar.hide { opacity: 0; pointer-events: none; }
    #logo { font-size: .95em; font-weight: 900; color: #00e676; font-family: Arial, sans-serif; letter-spacing: 1px; text-shadow: 0 0 10px #00e67677; }
    #channel-name { font-size: .8em; color: #bbb; font-family: Arial, sans-serif; background: rgba(255,255,255,.08); padding: 3px 10px; border-radius: 20px; }
    #loading {
      position: fixed; inset: 0; background: #000;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 300; gap: 18px; transition: opacity .5s;
    }
    #loading.fade { opacity: 0; pointer-events: none; }
    .spinner { width: 48px; height: 48px; border: 4px solid #222; border-top-color: #00e676; border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { color: #666; font-size: .78em; font-family: Arial, sans-serif; }
    #loading strong { color: #00e676; font-size: 1.2em; font-family: Arial, sans-serif; }
    #nourl { position: fixed; inset: 0; background: #000; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 14px; z-index: 400; }
    #nourl p { color: #555; font-size: .85em; font-family: Arial, sans-serif; text-align: center; max-width: 280px; line-height: 1.6; }
    #nourl strong { color: #e53935; }
    #urlbar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 500;
      background: rgba(0,0,0,.92); padding: 10px 14px; display: flex; gap: 8px;
      transform: translateY(100%); transition: transform .3s;
    }
    #urlbar.show { transform: translateY(0); }
    #urlbar input { flex: 1; padding: 9px 12px; background: #111; border: 1px solid #333; border-radius: 6px; color: #fff; font-size: .82em; font-family: Arial, sans-serif; min-width: 0; }
    #urlbar input:focus { outline: none; border-color: #00e676; }
    #urlbar button { padding: 9px 18px; background: #00e676; color: #000; border: none; border-radius: 6px; font-weight: 700; font-size: .82em; cursor: pointer; }
    #toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a1a1a; color: #ff6b6b; border: 1px solid #ff6b6b44;
      padding: 10px 20px; border-radius: 8px; font-size: .8em; font-family: Arial, sans-serif;
      z-index: 600; opacity: 0; transition: transform .3s, opacity .3s;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  </style>
</head>
<body>

  <div id="topbar">
    <span id="logo">▶ EcuTVHD</span>
    <span id="channel-name"></span>
  </div>

  <div id="loading">
    <div class="spinner"></div>
    <strong>EcuTVHD</strong>
    <p id="loading-text">Cargando transmisión...</p>
  </div>

  <div id="nourl">
    <strong>⚠️ Sin canal</strong>
    <p>No se especificó ningún canal.<br>Usa <code>?channel=nombre</code> en la URL.</p>
  </div>

  <div id="player"></div>

  <div id="urlbar">
    <input type="text" id="manualUrl" placeholder="Pega la URL del stream (.m3u8)">
    <button onclick="playManual()">▶ Play</button>
  </div>

  <div id="toast"></div>

  <script>
    'use strict';

    /* ══════════════════════════════════════════
       CONFIGURACIÓN — cambia BASE_URL a tu dominio
    ══════════════════════════════════════════ */
    var CONFIG = {
      BASE_URL: 'https://streamx741.com/global1.php?channel='
    };

    var playerInstance = null;

    function params() {
      var p = {};
      location.search.slice(1).split('&').forEach(function(s) {
        var kv = s.split('=');
        if (kv[0]) p[decodeURIComponent(kv[0])] = decodeURIComponent(kv[1] || '');
      });
      return p;
    }

    function showToast(msg, ms) {
      var t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(function(){ t.classList.remove('show'); }, ms || 4000);
    }

    function hiddenLoading() {
      var l = document.getElementById('loading');
      l.classList.add('fade');
      setTimeout(function(){ l.style.display='none'; }, 500);
    }

    var hideTimer;
    function resetHide() {
      document.getElementById('topbar').classList.remove('hide');
      clearTimeout(hideTimer);
      hideTimer = setTimeout(function(){
        document.getElementById('topbar').classList.add('hide');
      }, 4000);
    }
    document.addEventListener('mousemove', resetHide);
    document.addEventListener('touchstart', resetHide);

    function launchPlayer(url, label) {
      document.getElementById('channel-name').textContent = label || '';
      document.getElementById('loading-text').textContent = 'Conectando con ' + (label || 'el stream') + '...';

      if (playerInstance) { playerInstance.destroy(); playerInstance = null; }

      try {
        playerInstance = new Clappr.Player({
          source:   url,
          plugins:  [HlsjsPlayback, LevelSelector, AudioTrackSelector],
          width:    '100%',
          height:   '100%',
          autoPlay: true,
          parentId: '#player',
          mediacontrol: { seekbar: '#00e676', buttons: '#eee' },
          hlsUseNextLevel:    false,
          hlsMinimumDvrSize:  60,
          hlsRecoverAttempts: 16,
          hlsPlayback: { preload: true, customListeners: [] },
          playback: {
            extrapolatedWindowNumSegments: 2,
            triggerFatalErrorOnResourceDenied: false,
            hlsjsConfig: {}
          },
          events: {
            onPlay:  function() { hiddenLoading(); resetHide(); },
            onError: function(e) {
              console.error('Clappr error:', e);
              hiddenLoading();
              showToast('⚠ Stream offline o URL incorrecta.', 5000);
            }
          }
        });
        setTimeout(hiddenLoading, 8000);
      } catch(err) {
        console.error(err);
        hiddenLoading();
        showToast('Error al iniciar el reproductor.');
      }
    }

    function playManual() {
      var url = document.getElementById('manualUrl').value.trim();
      if (!url) return;
      document.getElementById('urlbar').classList.remove('show');
      document.getElementById('loading').style.display = 'flex';
      document.getElementById('loading').classList.remove('fade');
      launchPlayer(url, url.split('/').pop().split('?')[0]);
    }

    document.getElementById('manualUrl').addEventListener('keydown', function(e){
      if (e.key === 'Enter') playManual();
    });

    /* Doble clic / doble toque → mostrar barra URL manual */
    document.addEventListener('dblclick', function(){
      document.getElementById('urlbar').classList.toggle('show');
    });
    var tapCount = 0;
    document.addEventListener('touchend', function(){
      tapCount++;
      if (tapCount >= 2) { document.getElementById('urlbar').classList.toggle('show'); tapCount = 0; }
      setTimeout(function(){ tapCount = 0; }, 400);
    });

    /* ══ INICIO ══ */
    (function init() {
      var p = params();
      resetHide();
      if (p['url']) {
        launchPlayer(p['url'], p['url'].split('/').pop().split('?')[0]);
      } else if (p['channel']) {
        launchPlayer(CONFIG.BASE_URL + p['channel'], p['channel'].toUpperCase());
      } else {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('nourl').style.display   = 'flex';
      }
    })();
  </script>
</body>
</html>
