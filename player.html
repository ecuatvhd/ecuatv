<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TYC Sports — Live</title>
  <link rel="stylesheet" href="https://cdn.bitmovin.com/player/web/8/bitmovinplayer-ui.css" />
  <script src="https://cdn.bitmovin.com/player/web/8/bitmovinplayer.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 20px;
    }

    header { text-align: center; }
    header h1 { font-size: 1.5rem; font-weight: 700; color: #e8f0ff; }
    header p  { font-size: 0.82rem; color: #555; margin-top: 4px; }

    .player-wrapper {
      width: 100%;
      max-width: 900px;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 0 50px rgba(0,0,0,0.8);
      aspect-ratio: 16/9;
      background: #000;
    }

    #player { width: 100%; height: 100%; }

    #msg {
      font-size: 0.78rem;
      color: #555;
      text-align: center;
      max-width: 600px;
    }

    #msg.error { color: #c44; }
    #msg.ok    { color: #3a9; }
  </style>
</head>
<body>

  <header>
    <h1>TYC Sports</h1>
    <p>EN VIVO</p>
  </header>

  <div class="player-wrapper">
    <div id="player"></div>
  </div>

  <p id="msg">Iniciando…</p>

  <script>
    const MANIFEST = "https://lilac01.pontiscloud.com/live/eds/TYCSports/live_dash_cld/TYCSports.mpd";
    const LICENSE  = "11d3698c-efdf-42f1-8769-54663995de2b";
    const msg      = document.getElementById("msg");

    const config = {
      key: LICENSE,
      source: {
        dash: MANIFEST,
        type: "application/dash+xml"
      },
      playback: {
        autoplay: true,
        muted: false
      },
      ui: true,
      logs: { bitdash: false }
    };

    const player = new bitmovin.player.Player(document.getElementById("player"), config);

    player.on(bitmovin.player.PlayerEvent.Ready, () => {
      msg.textContent = "● EN VIVO — stream cargado";
      msg.className = "ok";
    });

    player.on(bitmovin.player.PlayerEvent.Error, (e) => {
      console.error("Bitmovin error:", e);
      msg.textContent = `Error: ${e.name || e.code} — ${e.message || "no se pudo cargar el stream"}`;
      msg.className = "error";
    });

    player.load(config.source).catch(err => {
      console.error("Load error:", err);
      msg.textContent = `No se pudo cargar: ${err.message || err}`;
      msg.className = "error";
    });
  </script>
</body>
</html>
