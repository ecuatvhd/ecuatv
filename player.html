<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TYC Sports — Live Stream</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 20px;
    }

    header {
      text-align: center;
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #e8f0ff;
    }

    header p {
      font-size: 0.85rem;
      color: #666;
      margin-top: 4px;
    }

    .player-wrapper {
      width: 100%;
      max-width: 860px;
      background: #111;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(0,0,0,0.7);
      position: relative;
    }

    video {
      width: 100%;
      display: block;
      aspect-ratio: 16/9;
      background: #000;
    }

    #status {
      padding: 10px 16px;
      font-size: 0.78rem;
      color: #aaa;
      background: #0e0e0e;
      border-top: 1px solid #1e1e1e;
      min-height: 36px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #status .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      background: #555;
      transition: background 0.3s;
    }

    #status.live .dot  { background: #e63; animation: pulse 1.5s infinite; }
    #status.error .dot { background: #c33; }
    #status.ok    .dot { background: #3c9; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    footer {
      font-size: 0.72rem;
      color: #333;
    }
  </style>
</head>
<body>

  <header>
    <h1>TYC Sports</h1>
    <p>Live Stream</p>
  </header>

  <div class="player-wrapper">
    <video id="video" controls autoplay playsinline></video>
    <div id="status">
      <span class="dot"></span>
      <span id="status-text">Iniciando reproductor…</span>
    </div>
  </div>

  <footer>Powered by Shaka Player</footer>

  <script>
    const MANIFEST = "https://lilac01.pontiscloud.com/live/eds/TYCSports/live_dash_cld/TYCSports.mpd";
    const KEY_ID   = "11d3698c-efdf-42f1-8769-54663995de2b";

    const video      = document.getElementById("video");
    const statusEl   = document.getElementById("status");
    const statusText = document.getElementById("status-text");

    function setStatus(type, msg) {
      statusEl.className = type;
      statusText.textContent = msg;
    }

    async function init() {
      shaka.polyfill.installAll();

      if (!shaka.Player.isBrowserSupported()) {
        setStatus("error", "Tu navegador no soporta DASH/EME. Usa Chrome o Edge.");
        return;
      }

      const player = new shaka.Player(video);

      // Mostrar errores detallados en consola
      player.addEventListener("error", (e) => {
        const err = e.detail;
        console.error("Shaka error:", err);
        setStatus("error", `Error ${err.code}: ${err.message || "fallo al cargar el stream"}`);
      });

      // Intentar primero sin DRM (algunos streams no lo requieren)
      player.configure({
        streaming: {
          bufferingGoal: 30,
          rebufferingGoal: 2,
          retryParameters: {
            maxAttempts: 5,
            baseDelay: 1000,
            backoffFactor: 2,
          }
        },
        manifest: {
          retryParameters: {
            maxAttempts: 5,
            baseDelay: 1000,
          }
        }
      });

      setStatus("", "Cargando stream…");

      try {
        await player.load(MANIFEST);
        setStatus("live", "● EN VIVO");
        video.play().catch(() => {});
      } catch (err) {
        console.warn("Sin DRM falló, intentando con ClearKey…", err);

        // Intento 2: ClearKey (útil si el key-id es un ClearKey real)
        // Necesitás la KEY en hex (16 bytes). El UUID lo convertimos:
        const keyIdHex = KEY_ID.replace(/-/g, "");

        player.configure({
          drm: {
            clearKeys: {
              [keyIdHex]: keyIdHex   // mismo valor como placeholder; reemplazá el segundo con la KEY real si tenés
            },
            retryParameters: { maxAttempts: 3 }
          }
        });

        try {
          await player.load(MANIFEST);
          setStatus("ok", "Stream cargado (ClearKey)");
          video.play().catch(() => {});
        } catch (err2) {
          console.error("ClearKey también falló:", err2);
          setStatus(
            "error",
            "El stream requiere DRM Widevine con servidor de licencias. Contactá al proveedor para obtener la URL de licencias."
          );
        }
      }
    }

    init();
  </script>
</body>
</html>
