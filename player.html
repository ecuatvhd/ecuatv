<!DOCTYPE html>
<html lang="es">
<head>
  <script src="https://annoyingnightmareedit.com/37/24/65/372465e85fae6f15526acc68d7f0bba9.js"></script>

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TYC Sports — Live</title>
  <link rel="stylesheet" href="https://cdn.bitmovin.com/player/web/8/bitmovinplayer-ui.css" />
  <script src="https://cdn.bitmovin.com/player/web/8/bitmovinplayer.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 20px;
    }
    header { text-align: center; }
    header h1 { font-size: 1.5rem; font-weight: 700; color: #e8f0ff; }
    header p  { font-size: 0.82rem; color: #555; margin-top: 4px; }
    .player-wrapper {
      width: 100%;
      max-width: 900px;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 0 50px rgba(0,0,0,0.8);
      aspect-ratio: 16/9;
      background: #000;
      position: relative;
    }
    #player { width: 100%; height: 100%; }
    #msg {
      font-size: 0.78rem;
      color: #555;
      text-align: center;
    }
    #msg.error { color: #c44; }
    #msg.ok    { color: #3a9; }
  </style>
</head>
<body>

  <header>
    <h1>TYC Sports</h1>
    <p>EN VIVO</p>
  </header>

  <div class="player-wrapper">
    <div id="player"></div>
  </div>

  <p id="msg">Iniciando…</p>

  <script>
    // Intercepta las llamadas de licencia de Bitmovin para que funcione sin dominio registrado
    (function () {
      var fakeGranted = 'data:text/plain;charset=utf-8;base64,eyJzdGF0dXMiOiJncmFudGVkIiwibWVzc2FnZSI6IlRoZXJlIHlvdSBnby4ifQ==';
      var _open = XMLHttpRequest.prototype.open;
      XMLHttpRequest.prototype.open = function () {
        var url = arguments[1] || '';
        if (url.indexOf('licensing.bitmovin.com') > -1) {
          arguments[1] = fakeGranted;
        }
        return _open.apply(this, arguments);
      };
    })();

    var msg = document.getElementById('msg');

    var config = {
      key: '11d3698c-efdf-42f1-8769-54663995de2b',
      playback: { autoplay: true, muted: false },
      style: { width: '100%', height: '100%' }
    };

    var source = {
      dash: 'https://lilac01.pontiscloud.com/live/eds/TYCSports/live_dash_cld/TYCSports.mpd',
      drm: {
        clearkey: [
          {
            keyId: '53d0cf6c1d49c16f5180f86e1870b00f',
            key:   '7eb6743b5f44b52ba27c88229c8c7ae2'
          }
        ]
      }
    };

    var player = new bitmovin.player.Player(document.getElementById('player'), config);

    player.load(source).then(function () {
      msg.textContent = '● EN VIVO';
      msg.className = 'ok';
    }).catch(function (err) {
      console.error('Error:', err);
      msg.textContent = 'Error al cargar: ' + (err.message || JSON.stringify(err));
      msg.className = 'error';
    });
  </script>

</body>
</html>
