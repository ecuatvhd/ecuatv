<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ecuatvhdplay</title>
<style>
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background-color: #000;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .video-wrapper {
    position: relative;
    width: 80%;
    padding-top: 18.75%; /* 16:3 */
    background: black;
  }
  iframe {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    border: none;
  }
</style>
</head>
<body>

<div class="video-wrapper">
  <iframe id="player" allowfullscreen allow="autoplay; fullscreen"></iframe>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const channel = params.get("channel");
  const r = params.get("r");

  if (channel) {
    // Codificar el nombre del canal en Base64
    const encodedChannel = btoa(channel);

    // Construir la URL de tu backend Replit
    const backendUrl = `https://streamx741.com/global1.php?channel=${encodedChannel}`;

    // Codificar esa URL completa en Base64
    const encodedBackendUrl = btoa(backendUrl);

    // Redirigir a la versión con ?r=...
    const newUrl = `${window.location.origin}${window.location.pathname}?r=${encodedBackendUrl}`;
    window.location.replace(newUrl);
  } else if (r) {
    // Decodificar la URL completa y asignarla al iframe
    const decodedUrl = atob(r);
    document.getElementById("player").src = decodedUrl;
  }
</script>

</body>
</html>
