<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Deofuscador de Streams</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #0d0d0d;
      --card:   #161616;
      --border: #262626;
      --accent: #18c5a3;
      --text:   #e0e0e0;
      --muted:  #555;
      --error:  #e05555;
      --radius: 10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 60px;
      gap: 28px;
    }

    header { text-align: center; }
    header h1 { font-size: 1.6rem; font-weight: 700; color: #fff; }
    header p  { font-size: 0.85rem; color: var(--muted); margin-top: 6px; max-width: 500px; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      width: 100%;
      max-width: 640px;
    }

    label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .input-row { display: flex; gap: 10px; }

    input[type="text"] {
      flex: 1;
      background: #111;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.9rem;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: var(--accent); }

    button {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 700;
      padding: 10px 20px;
      cursor: pointer;
      transition: opacity 0.2s;
      white-space: nowrap;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    #status {
      font-size: 0.82rem;
      margin-top: 12px;
      min-height: 20px;
      color: var(--muted);
    }
    #status.error { color: var(--error); }
    #status.ok    { color: var(--accent); }

    .result-card { display: none; }
    .result-card.visible { display: block; }

    .result-title {
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    .result-value {
      background: #111;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 44px 12px 14px;
      font-family: "Courier New", monospace;
      font-size: 0.82rem;
      color: var(--accent);
      word-break: break-all;
      margin-bottom: 16px;
      cursor: pointer;
      position: relative;
      transition: border-color 0.2s;
      min-height: 42px;
    }
    .result-value:hover { border-color: var(--accent); }
    .copy-hint {
      position: absolute;
      top: 50%; right: 12px;
      transform: translateY(-50%);
      font-size: 0.65rem;
      color: var(--muted);
      text-transform: uppercase;
      pointer-events: none;
    }
    .result-value.copied .copy-hint { color: var(--accent); content: "✓"; }

    .divider { border: none; border-top: 1px solid var(--border); margin: 4px 0 20px; }
    .block-label {
      font-size: 0.7rem; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.06em;
      margin: 0 0 6px;
    }

    footer { font-size: 0.72rem; color: #333; text-align: center; }

    .spinner {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid #333;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <header>
    <h1>Deofuscador de Streams</h1>
    <p>Pegá la URL de la página del canal y extraerá automáticamente la URL del stream y las claves DRM.</p>
  </header>

  <div class="card">
    <label for="urlInput">URL de la página</label>
    <div class="input-row">
      <input
        id="urlInput"
        type="text"
        placeholder="https://latamplay1.click/channel/tyc.php"
        spellcheck="false"
        autocomplete="off"
      />
      <button id="btn" onclick="extract()">Extraer</button>
    </div>
    <div id="status"></div>
  </div>

  <div class="card result-card" id="resultCard">
    <p class="result-title">Resultados</p>
    <hr class="divider" />

    <p class="block-label">URL del Stream (DASH / MPD)</p>
    <div class="result-value" id="outUrl" onclick="copyVal(this)">
      <span class="val-text"></span><span class="copy-hint">copiar</span>
    </div>

    <p class="block-label">Key ID (ClearKey)</p>
    <div class="result-value" id="outKeyId" onclick="copyVal(this)">
      <span class="val-text"></span><span class="copy-hint">copiar</span>
    </div>

    <p class="block-label">Key (ClearKey)</p>
    <div class="result-value" id="outKey" onclick="copyVal(this)">
      <span class="val-text"></span><span class="copy-hint">copiar</span>
    </div>
  </div>

  <footer>Las claves pueden rotar. Si el stream deja de funcionar, volvé a extraer.</footer>

  <script>
    // Proxies CORS públicos (se prueban en orden)
    var PROXIES = [
      function(u) { return 'https://api.allorigins.win/get?url=' + encodeURIComponent(u); },
      function(u) { return 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(u); },
      function(u) { return 'https://corsproxy.io/?' + encodeURIComponent(u); }
    ];

    function setStatus(html, cls) {
      var el = document.getElementById('status');
      el.innerHTML = html;
      el.className = cls || '';
    }

    function setVal(id, text) {
      var el = document.getElementById(id);
      el.querySelector('.val-text').textContent = text || '—';
    }

    function copyVal(el) {
      var text = el.querySelector('.val-text').textContent.trim();
      if (!text || text === '—') return;
      navigator.clipboard.writeText(text).then(function () {
        el.classList.add('copied');
        el.querySelector('.copy-hint').textContent = '✓ copiado';
        setTimeout(function () {
          el.classList.remove('copied');
          el.querySelector('.copy-hint').textContent = 'copiar';
        }, 1800);
      });
    }

    function decodeHtmlEntities(str) {
      var txt = document.createElement('textarea');
      txt.innerHTML = str;
      return txt.value;
    }

    function extractFromHtml(rawHtml) {
      // Decodificar entidades HTML que el proxy pueda haber añadido
      var html = decodeHtmlEntities(rawHtml);

      // Buscar el bloque IIFE que contiene las variables
      // Patrón flexible: var url,ck_keyid,ck_key; ... return NÚMERO})()
      var patterns = [
        /var url,ck_keyid,ck_key;[\s\S]*?return \d+\}\)\(\)/,
        /var url,ck_keyid,ck_key;[\s\S]*?\}\)\(\)/,
        /var url,ck_keyid,ck_key[\s\S]*?ck_key\s*\}/
      ];

      var block = null;
      for (var i = 0; i < patterns.length; i++) {
        var m = html.match(patterns[i]);
        if (m) { block = m[0]; break; }
      }

      if (!block) {
        console.warn('[deofuscador] Bloque no encontrado. Buscando fragmento...');
        // Buscar manualmente entre etiquetas <script>
        var scripts = html.match(/<script[\s\S]*?<\/script>/gi) || [];
        for (var s = 0; s < scripts.length; s++) {
          if (scripts[s].indexOf('ck_keyid') > -1 && scripts[s].indexOf('ck_key') > -1) {
            var inner = scripts[s].replace(/<\/?script[^>]*>/gi, '');
            for (var p = 0; p < patterns.length; p++) {
              var mm = inner.match(patterns[p]);
              if (mm) { block = mm[0]; break; }
            }
          }
          if (block) break;
        }
      }

      if (!block) return null;

      console.log('[deofuscador] Bloque encontrado, longitud:', block.length);

      // Limpiar posibles vars globales previas
      try { delete window.url; } catch(e) {}
      try { delete window.ck_keyid; } catch(e) {}
      try { delete window.ck_key; } catch(e) {}
      window.url      = undefined;
      window.ck_keyid = undefined;
      window.ck_key   = undefined;

      // Ejecutar el bloque — el Function() interno asigna directamente a window.*
      try {
        // eslint-disable-next-line no-eval
        eval(block);
      } catch (e) {
        console.warn('[deofuscador] eval error (ignorable):', e.message);
      }

      var result = {
        url:      window.url,
        ck_keyid: window.ck_keyid,
        ck_key:   window.ck_key
      };

      console.log('[deofuscador] Resultado:', result);
      return result;
    }

    async function fetchViaProxy(targetUrl, proxyFn) {
      var proxyUrl = proxyFn(targetUrl);
      var resp = await fetch(proxyUrl, {
        headers: { 'Accept': 'application/json, text/plain, */*' },
        cache: 'no-store'
      });
      if (!resp.ok) throw new Error('HTTP ' + resp.status + ' desde proxy');
      var text = await resp.text();
      // allorigins devuelve { contents: "..." }
      try {
        var json = JSON.parse(text);
        if (json && json.contents) return json.contents;
      } catch (e) { }
      return text;
    }

    async function extract() {
      var rawUrl = document.getElementById('urlInput').value.trim();
      if (!rawUrl) { setStatus('Ingresá una URL primero.', 'error'); return; }
      if (!/^https?:\/\//i.test(rawUrl)) rawUrl = 'https://' + rawUrl;

      document.getElementById('btn').disabled = true;
      document.getElementById('resultCard').classList.remove('visible');

      var html = null;
      var lastErr = '';

      for (var i = 0; i < PROXIES.length; i++) {
        setStatus('<span class="spinner"></span>Obteniendo página (proxy ' + (i + 1) + '/' + PROXIES.length + ')…');
        try {
          var candidate = await fetchViaProxy(rawUrl, PROXIES[i]);
          if (candidate && candidate.length > 300) {
            html = candidate;
            console.log('[deofuscador] Proxy ' + (i+1) + ' OK, tamaño:', html.length);
            break;
          }
        } catch (e) {
          lastErr = e.message;
          console.warn('[deofuscador] Proxy ' + (i+1) + ' falló:', e.message);
        }
      }

      if (!html) {
        setStatus('No se pudo obtener la página: ' + lastErr + '<br>Puede que el sitio bloquee proxies externos.', 'error');
        document.getElementById('btn').disabled = false;
        return;
      }

      setStatus('<span class="spinner"></span>Analizando código JavaScript…');

      var result;
      try {
        result = extractFromHtml(html);
      } catch (e) {
        setStatus('Error al analizar: ' + e.message, 'error');
        document.getElementById('btn').disabled = false;
        return;
      }

      if (!result || (!result.url && !result.ck_keyid)) {
        setStatus(
          'No se encontró el bloque de stream.<br>' +
          '<small style="color:#444">Este formato de ofuscación puede ser diferente. Abrí la consola del navegador (F12) para ver detalles.</small>',
          'error'
        );
        document.getElementById('btn').disabled = false;
        return;
      }

      setStatus('✓ Extracción exitosa', 'ok');
      setVal('outUrl',   result.url);
      setVal('outKeyId', result.ck_keyid);
      setVal('outKey',   result.ck_key);
      document.getElementById('resultCard').classList.add('visible');
      document.getElementById('btn').disabled = false;
    }

    document.getElementById('urlInput').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') extract();
    });
  </script>

</body>
</html>
