<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página App</title>
  <style>
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background-color: #000;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>

<iframe id="appFrame" allow="autoplay; fullscreen" scrolling="yes"></iframe>

<script>
  const params = new URLSearchParams(window.location.search);
  const r = params.get("r");

  if (r) {
    // ✅ Decodificar la URL en Base64 y mostrarla en el iframe
    const decodedUrl = atob(r);
    document.getElementById("appFrame").src = decodedUrl;
  } else {
    // ✅ Si no hay ?r=, convertir automáticamente la URL de Replit en Base64 y redirigir
    const backendUrl = "https://live-event-stream--hernantv94.replit.app/";
    const encodedBackendUrl = btoa(backendUrl);
    const newUrl = `${window.location.origin}${window.location.pathname}?r=${encodedBackendUrl}`;
    window.location.replace(newUrl);
  }
</script>

</body>
</html>
