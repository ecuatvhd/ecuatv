<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcuatvHD </title>
  <style>
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background-color: #000;
      display: flex;
      flex-direction: column; /* ✅ permite arriba y abajo */
    }
    header, footer {
      color: white;
      text-align: center;
      padding: 10px;
      background: #111;
    }
    iframe {
      flex: 1;               /* ✅ ocupa todo el espacio disponible */
      width: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>

<header>
  <h2>EcuatvHD</h2>
</header>

<iframe id="appFrame" allow="autoplay; fullscreen"></iframe>

<footer>
  <p>© 2026 EcuatvHD - Fútbol HD</p>
</footer>

<script>
  const params = new URLSearchParams(window.location.search);
  const r = params.get("r");

  if (r) {
    // ✅ Decodificar la URL en Base64 y mostrarla en el iframe
    const decodedUrl = atob(r);
    document.getElementById("appFrame").src = decodedUrl;
  } else {
    // ✅ Si no hay ?r=, convertir automáticamente la URL de Replit en Base64 y redirigir
    const backendUrl = "https://live-event-stream--hernantv94.replit.app/";
    const encodedBackendUrl = btoa(backendUrl);
    const newUrl = `${window.location.origin}${window.location.pathname}?r=${encodedBackendUrl}`;
    window.location.replace(newUrl);
  }
</script>

</body>
</html>
